services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudstore
      POSTGRES_USER: cloudstore
      POSTGRES_PASSWORD: cloudstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudstore -d cloudstore"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: cloudstore-redis
    restart: unless-stopped
    command: sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    environment:
      REDIS_PASSWORD: cloudstore
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: cloudstore-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cloudstore
      MINIO_ROOT_PASSWORD: cloudstore123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cloudstore-backend
    restart: unless-stopped
    environment:
      DB_URL: postgres://cloudstore:cloudstore@postgres:5432/cloudstore?sslmode=disable
      REDIS_URL: redis://:cloudstore@redis:6379/0
      MINIO_URL: http://minio:9000
      MIGRATIONS_PATH: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
  minio_data:
