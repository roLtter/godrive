services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudstore
      POSTGRES_USER: cloudstore
      POSTGRES_PASSWORD: cloudstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cloudstore-redis
    restart: unless-stopped
    command: sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    environment:
      REDIS_PASSWORD: cloudstore
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
